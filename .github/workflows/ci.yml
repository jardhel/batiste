name: CI

on:
  push:
    branches: [main, "release/*"]
  pull_request:
    branches: [main, "release/*"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-typecheck-test:
    name: lint + typecheck + test + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint → SARIF)
        run: |
          pnpm exec eslint . \
            --format @microsoft/eslint-formatter-sarif \
            --output-file reports/eslint.sarif || true
        continue-on-error: false

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test (vitest with v8 coverage)
        run: pnpm -r test --coverage

      - name: Knip (dead-code scan)
        run: pnpm exec knip --reporter json --no-exit-code > reports/knip.json || true

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/eslint.sarif
          category: eslint

      - name: Upload reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: |
            reports/
            packages/*/coverage/
          retention-days: 30

  license-gate:
    name: license gate + NOTICE
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: License report
        run: node scripts/generate-license-report.mjs --strict
      - name: NOTICE aggregation
        run: node scripts/generate-notice.mjs --verify
      - name: Upload license artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: |
            reports/licenses.json
            reports/licenses.html
            NOTICE
          retention-days: 90
